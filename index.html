 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo BOT</title>
    <link rel="stylesheet" href="bot.css">
</head>
<body>

    <div class="sidebar-panel" id="sidebar-panel">
        <div class="sidebar-actions">
            <button class="sidebar-action-btn" id="new-chat-btn">
                <span class="icon">📝</span> नई चैट
            </button>
            <button class="sidebar-action-btn">
                <span class="icon">🔍</span> चैट खोजें
            </button>
            <button class="sidebar-action-btn">
                <span class="icon">📚</span> लाइब्रेरी
            </button>
        </div>

        <div class="sidebar-divider"></div>
        <div class="recent-title">हाल ही के (Recent)</div>

        <div class="sidebar-content">
            <div class="sidebar-item active-item">💬 Futuristic Gaming Website...</div>
            <div class="sidebar-item">💬 Footer Se Contact Link Kais...</div>
            <div class="sidebar-item">💬 Kya aisa matlab abhi aisi no...</div>
            <div class="sidebar-item">💬 GB Production Studios: Next...</div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="avatar">GB</div>
                <div class="user-info">
                    <span class="username">Gulshan Bhardwaj</span>
                </div>
            </div>
            <button class="settings-btn" title="Settings">⚙️</button>
        </div>
    </div>
    
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="cyber-chat-container">
        
        <div class="chat-header">
            <button class="menu-toggle-btn" id="menu-toggle-btn">&#9776;</button>
            <h2>NEO BOT</h2>
            <div style="width: 32px;"></div> </div>

        <div class="chat-box" id="chat-box">
            <div class="message bot-msg">
                <div class="msg-bubble">
                    SYSTEM ONLINE: Main Neo BOT hoon. Kuch bhi pucho bhai, main Gemini AI se live jawab dunga... 🤖✨
                </div>
            </div>
        </div>

        <div class="chat-input-wrapper">
            <div class="chat-input-tray">
                <button class="attach-btn" id="attach-btn" title="Upload File">+</button>
                <input type="text" id="user-input" placeholder="Ask Neo BOT anything..." autocomplete="off">
                <button class="send-btn" id="send-btn">SEND</button>
            </div>
        </div>

    </div>

    <script src="bot.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="Neobotai.com, online game, Neobotai.in, browser game, HTML5 , Web, gulshanbhardwaj1, Gulshan Bhardwaj, 3D website, free chatbot AI, Ai, GitHub , interactive chat ai, glamour AI.com, glamour ai.in">
  8
    <meta name="description" content="free AI, gemini API use,">
<title>Glamour AI — Chat Assistant</title>

<!-- FontAwesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================= -->
<!-- LOGIN SCREEN (shown by default) -->
<!-- ============================= -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <i class="fa-solid fa-atom"></i>
    </div>
    <h1>Welcome to Glamour Ai</h1>
    <p>Your intelligent assistant, ready to help with anything.</p>

    <button id="google-login-btn" class="google-login-btn">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
      <span>Continue with Google</span>
    </button>

    <p class="login-footer">By continuing, you agree to Glamour AI's Terms & Privacy Policy.</p>
  </div>
</div>

<!-- ============================= -->
<!-- MAIN APP (hidden by default) -->
<!-- ============================= -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
      <button id="new-chat-btn" class="new-chat-btn">
        <i class="fa-solid fa-plus"></i>
        <span>New Chat</span>
      </button>
    </div>

    <div class="sidebar-section-label">Recent Chats</div>
    <div id="recent-chats" class="recent-chats">
      <!-- Chat history items injected here by script.js -->
    </div>

    <div class="sidebar-bottom">
      <div class="user-profile">
        <img class="avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=Gulshan&backgroundColor=6366f1" alt="avatar">
        <div class="user-info">
          <span class="user-name">user</span>
          <span class="user-status">Free Plan</span>
        </div>
        <button id="logout-btn" class="logout-btn" title="Logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- OVERLAY for mobile sidebar -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- MAIN CHAT AREA -->
  <main class="main-content">
    <header class="chat-header">
      <button id="menu-toggle-btn" class="icon-btn" title="Toggle sidebar">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="header-title">
        <i class="fa-solid fa-atom header-icon"></i>
        <span>Glamour AI</span>
      </div>
      <div class="header-spacer"></div>
    </header>

    <section id="chat-window" class="chat-window">
      <!-- Messages injected here by script.js -->
    </section>

    <form id="chat-form" class="chat-input-bar">
      <div class="input-wrapper">
        <input
          type="text"
          id="user-input"
          placeholder="Message Nova AI..."
          autocomplete="off"
          required
        />
        <button type="submit" id="send-btn" class="send-btn" title="Send">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
      <p class="disclaimer">Glamour AI may display inaccurate info. Verify important details.</p>
    </form>
  </main>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
